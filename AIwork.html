<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AIwork - 인지학습치료 회기기록</title>
<style>
/* ============================================================
   styles.css
   AIwork(구 CogLog) 테마 스타일시트.
   따뜻한 베이지 배경 + 네이비 포인트 + 둥근 카드 UI.
   Tailwind 없이 순수 CSS로 동일한 느낌의 유틸리티 클래스를 제공한다.
   ============================================================ */

:root {
  --beige-bg: #f6efe4;
  --beige-panel: #fbf6ee;
  --beige-border: #e6d9c3;
  --navy: #24344d;
  --navy-dark: #182636;
  --navy-soft: #3d5273;
  --accent: #c98a4b;
  --text-main: #2c2620;
  --text-sub: #6b6255;
  --danger: #b3543f;
  --success: #4c7a5a;
  --warn: #b98b2e;
  --radius-lg: 20px;
  --radius-md: 14px;
  --radius-sm: 10px;
  --shadow-card: 0 2px 10px rgba(60, 45, 20, 0.06);
}

* {
  box-sizing: border-box;
}

html, body, #root {
  height: 100%;
}

body {
  margin: 0;
  font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
  background: var(--beige-bg);
  color: var(--text-main);
  -webkit-font-smoothing: antialiased;
}

button {
  font-family: inherit;
}

/* ---------- 레이아웃 ---------- */
.app-shell {
  display: flex;
  min-height: 100vh;
}

.sidebar {
  width: 232px;
  flex-shrink: 0;
  background: var(--navy);
  color: #f3ede0;
  padding: 24px 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.sidebar-brand {
  padding: 0 8px 20px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.12);
  margin-bottom: 14px;
}

.sidebar-brand-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.3px;
  color: #fff;
}

.sidebar-brand-sub {
  font-size: 12.5px;
  color: #c9d2df;
  margin-top: 4px;
}

.sidebar-menu-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14.5px;
  color: #dbe2ed;
  transition: background 0.15s ease, color 0.15s ease;
  border: none;
  background: transparent;
  text-align: left;
  width: 100%;
}

.sidebar-menu-item:hover {
  background: rgba(255,255,255,0.08);
}

.sidebar-menu-item.active {
  background: var(--accent);
  color: #2b1c0e;
  font-weight: 600;
}

.sidebar-footer {
  margin-top: auto;
  font-size: 11.5px;
  color: #8f9bb0;
  padding: 10px 8px 0 8px;
}

.main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.top-header {
  background: var(--beige-panel);
  border-bottom: 1px solid var(--beige-border);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.top-header-title {
  font-size: 19px;
  font-weight: 700;
  color: var(--navy-dark);
}

.top-header-sub {
  font-size: 12.5px;
  color: var(--text-sub);
  margin-top: 2px;
}

.header-child-select {
  display: flex;
  align-items: center;
  gap: 8px;
}

.content-area {
  flex: 1;
  padding: 28px 32px 48px 32px;
  overflow-y: auto;
}

/* ---------- 카드 ---------- */
.card {
  background: var(--beige-panel);
  border: 1px solid var(--beige-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  padding: 24px;
  margin-bottom: 20px;
}

.card-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--navy-dark);
  margin: 0 0 16px 0;
}

.card-title-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.section-desc {
  font-size: 13px;
  color: var(--text-sub);
  margin-bottom: 18px;
}

/* ---------- 폼 요소 ---------- */
.form-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px 20px;
}

.form-grid.cols-1 {
  grid-template-columns: 1fr;
}

.form-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.form-field.span-2 {
  grid-column: span 2;
}

label, .form-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--navy-soft);
}

input[type="text"], input[type="date"], input[type="number"], input[type="time"],
select, textarea {
  border: 1px solid var(--beige-border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 14px;
  background: #fff;
  color: var(--text-main);
  outline: none;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
  width: 100%;
  font-family: inherit;
}

textarea {
  resize: vertical;
  min-height: 78px;
  line-height: 1.5;
}

input:focus, select:focus, textarea:focus {
  border-color: var(--navy-soft);
  box-shadow: 0 0 0 3px rgba(36, 52, 77, 0.12);
}

.helper-text {
  font-size: 11.5px;
  color: var(--text-sub);
}

/* ---------- 버튼 ---------- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid transparent;
  transition: opacity 0.15s ease, transform 0.05s ease;
}

.btn:active {
  transform: translateY(1px);
}

.btn-primary {
  background: var(--navy);
  color: #fff;
}
.btn-primary:hover { opacity: 0.9; }

.btn-accent {
  background: var(--accent);
  color: #2b1c0e;
}
.btn-accent:hover { opacity: 0.9; }

.btn-secondary {
  background: #fff;
  color: var(--navy);
  border: 1px solid var(--beige-border);
}
.btn-secondary:hover { background: #f2ece0; }

.btn-danger {
  background: #fff;
  color: var(--danger);
  border: 1px solid #e5c9c0;
}
.btn-danger:hover { background: #fbf0ed; }

.btn-sm {
  padding: 6px 12px;
  font-size: 12.5px;
}

.btn-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

/* ---------- 배지 / 태그 ---------- */
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 11.5px;
  font-weight: 600;
}

.badge-navy { background: rgba(36,52,77,0.1); color: var(--navy); }
.badge-accent { background: rgba(201,138,75,0.18); color: #8a5a24; }
.badge-success { background: rgba(76,122,90,0.15); color: var(--success); }
.badge-warn { background: rgba(185,139,46,0.16); color: var(--warn); }
.badge-danger { background: rgba(179,84,63,0.14); color: var(--danger); }
.badge-muted { background: #ece4d5; color: var(--text-sub); }

.tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 999px;
  background: #eee3cf;
  color: var(--navy-dark);
  font-size: 12px;
  margin: 3px 4px 0 0;
}

/* ---------- 목록 / 테이블 ---------- */
.list-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border: 1px solid var(--beige-border);
  border-radius: var(--radius-md);
  background: #fff;
  margin-bottom: 10px;
  gap: 12px;
}

.list-row:hover {
  border-color: var(--navy-soft);
}

.filter-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 18px;
  align-items: flex-end;
}

.filter-field {
  display: flex;
  flex-direction: column;
  gap: 5px;
  min-width: 160px;
}

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-sub);
  font-size: 13.5px;
}

/* ---------- 탭 내부 서브탭 ---------- */
.subtab-row {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}

.subtab-btn {
  padding: 9px 16px;
  border-radius: 999px;
  border: 1px solid var(--beige-border);
  background: #fff;
  color: var(--text-sub);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}

.subtab-btn.active {
  background: var(--navy);
  color: #fff;
  border-color: var(--navy);
}

/* ---------- 생성된 일지/보고서 출력 박스 ---------- */
.output-box {
  background: #fffdf8;
  border: 1.5px dashed var(--beige-border);
  border-radius: var(--radius-md);
  padding: 18px;
  white-space: pre-wrap;
  line-height: 1.7;
  font-size: 14px;
  color: var(--text-main);
  min-height: 100px;
}

/* ---------- 자주 쓰는 어휘 클릭 입력 칩 ---------- */
.vocab-chip {
  display: inline-flex;
  align-items: center;
  padding: 5px 11px;
  margin: 0 6px 6px 0;
  border-radius: 999px;
  border: 1px dashed #cbb98f;
  background: #fbf3e2;
  color: var(--navy-soft);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s ease, border-color 0.15s ease;
}

.vocab-chip:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: #2b1c0e;
}

/* ---------- 목표/진도 카드 ---------- */
.goal-card {
  border: 1px solid var(--beige-border);
  border-radius: var(--radius-md);
  background: #fff;
  padding: 16px 18px;
  margin-bottom: 12px;
}

.goal-card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.progress-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}

/* ---------- 시간표 ---------- */
.timetable-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 12px;
}

.timetable-col-head {
  font-weight: 700;
  color: var(--navy-dark);
  text-align: center;
  padding: 8px 0;
  border-bottom: 2px solid var(--navy);
  margin-bottom: 8px;
}

.timetable-slot {
  background: #fff;
  border: 1px solid var(--beige-border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  margin-bottom: 8px;
  font-size: 12.5px;
}

.timetable-slot-time {
  font-weight: 700;
  color: var(--navy);
}

/* ---------- 아동 선택 카드형 리스트 ---------- */
.child-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-radius: 999px;
  border: 1.5px solid var(--beige-border);
  background: #fff;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-main);
}

.child-pill.active {
  border-color: var(--navy);
  background: var(--navy);
  color: #fff;
}

/* ---------- 스크롤바 ---------- */
::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
::-webkit-scrollbar-thumb {
  background: #d9c9a8;
  border-radius: 8px;
}
::-webkit-scrollbar-track {
  background: transparent;
}

/* ---------- 반응형 (노트북 우선이지만 최소한의 대응) ---------- */
@media (max-width: 980px) {
  .form-grid { grid-template-columns: 1fr; }
  .form-field.span-2 { grid-column: span 1; }

</style>
